<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    
    <link rel="stylesheet" href="styles3.css">
</head>
<body>

    <h1 class="title">Список дел</h1>

    <div class="form">
        <input type="text" placeholder="Новый элемент списка">
        <button class="button-create">Создать</button>
        <button class="button-clear">Очистить всё</button>
    </div>

    <div class="list">
        <div class="task task-done">
            <div class="icon">
                <svg class="icon-check" viewBox="0 0 24 24">
                    <path d="M9 11l3 3L22 4"></path>
                    <rect x="3" y="5" width="18" height="18" rx="2"></rect>
                </svg>
            </div>
            <div class="text">
                <h3>Почесать кошку</h3>
                <p>от 14.08.2023</p>
            </div>
            <button class="button-delete">
                <svg class="icon-cross" viewBox="0 0 24 24">
                    <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="task task-gray">
            <div class="icon"></div>
            <div class="text">
                <h3>Полить картошку</h3>
                <p>от 04.05.2022</p>
            </div>
            <button class="button-delete">
                <svg class="icon-cross" viewBox="0 0 24 24">
                    <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="task task-white">
            <div class="icon"></div>
            <div class="text">
                <h3>Сложить в лукошко</h3>
                <p>от 19.05.2022</p>
            </div>
            <button class="button-delete">
                <svg class="icon-cross" viewBox="0 0 24 24">
                    <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>

    <footer class="footer">
        Copyright ©
    </footer>

</body>
</html>
